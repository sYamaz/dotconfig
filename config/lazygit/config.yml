gui:
  nerdFontsVersion: "3"
os:
  # エディタを nvim に固定。未指定だと lazygit が EDITOR/core.editor などから
  # 自動検出するため、デバイスや環境によって hx 等にブレる。lazygit-edit:// の
  # ファイルリンク(下記 pager)を開く際もこの preset が使われる。
  editPreset: "nvim"
git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never --line-numbers --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
