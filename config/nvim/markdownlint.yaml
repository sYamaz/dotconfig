# markdownlint rules (nvim専用 / lua/plugins/markdown.lua から --config で参照)
# ルール一覧: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md
default: true
MD060: false   # table-column-style — テーブルの列区切り(|---|)の揃えを強制しない
MD013: false   # line-length — 1行の文字数制限をしない
MD040: false   # fenced-code-language — コードブロックの言語指定を強制しない
# 必要なら以下も off にする（コメントアウトを外す）:
# MD033: false # no-inline-html
# MD041: false # first-line-h1
# MD024: false # no-duplicate-heading
