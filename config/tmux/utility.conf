# Display lazygit
bind -r -N "lazygitをポップアップで開く" g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

# IDEレイアウトを展開 (i=display-message, I=tpm, D/L/Eは使用中のため C-i を使用)
bind -N "IDEレイアウトを展開" C-i run-shell "~/.config/tmux/scripts/ide"

# Run Claude Code in a separate session
bind -r -N "Claude Codeを別セッションのポップアップで起動" y run-shell '\
  SESSION="claude-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude"; \
  tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'
