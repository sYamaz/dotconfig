# 内側アプリに渡す $TERM。xterm-256color は「実 xterm」を詐称しケーパビリティ不整合を招く
# ため、tmux 公式推奨の tmux-256color を使う。
set -g default-terminal "tmux-256color"
# truecolor / undercurl は macos.conf の terminal-features (RGB / usstyle) で有効化する。
# action key
unbind C-b
set-option -g prefix C-t
set-option -g repeat-time 0
set-option -g focus-events on

#### Key bindings

set-window-option -g mode-keys vi

#bind t send-key C-t
# Reload settings
bind -N "設定を再読み込み" r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
# 新規セッションを作成(名前を入力。空Enterで自動命名)
bind -N "新規セッションを作成(名前を入力)" N command-prompt -p "New session name:" "new-session -s '%%'"
# 名前を聞かずに新規セッションを即作成
bind -N "新規セッションを即作成" S new-session
# Open current directory
bind -N "現在のディレクトリをFinderで開く" o run-shell "open '#{pane_current_path}'"
bind -r -N "カレント以外のペインを全て閉じる" e kill-pane -a

# Moving window
bind-key -n -N "ウィンドウを左へ移動" C-S-Left swap-window -t -1 \; previous-window
bind-key -n -N "ウィンドウを右へ移動" C-S-Right swap-window -t +1 \; next-window

#### basic settings

# 接続中セッションが破棄されても tmux から抜けず、別セッションへ切り替える
set -g detach-on-destroy off
# ウィンドウを閉じたら番号を詰め直す(#I が飛ばないようにする)
set -g renumber-windows on

set-option -g status-justify "left"
#set-option utf8-default on
#set-option -g mouse-select-pane

# マウス操作を有効化。
# ホイールでスクロールバック(copy-mode)に入りログを遡れる。
# 代替画面アプリ(Claude Code等)へは本物のマウスイベントが転送され、
# 「スクロールが矢印キー連打に化ける(alternate scroll)」現象も解消する。
set -g mouse on

set-window-option -g mode-keys vi
#set-window-option -g utf8 on
# look'n feel
set-option -g status-fg cyan
set-option -g status-bg black
# pane border / window style は theme.conf に集約
set-option -g history-limit 64096

# 選択内容を OSC52 経由で macOS のシステムクリップボードへ転送する。
# (reattach-to-user-namespace の代替。Ghostty は OSC52 書き込みに対応)
set -g set-clipboard on

set -sg escape-time 10

# Claude Code 等の通知(OSC 9/777)と progress bar を、tmux を迂回して外側 Ghostty へ
# 素通しさせる。all は不可視ペインからも通すため、別 tmux ウィンドウで作業中でも通知が届く
# (on は可視ペインのみ)。注入リスクは bare-Ghostty と同種・同程度(set-clipboard on 済み)。
set -g allow-passthrough all

# Shift+Enter を通常 Enter と区別する(Claude Code 等の改行)。tmux が CSI u 拡張キーを
# 扱えるようにする。外側 Ghostty への送出可否は macos.conf の terminal-features 'extkeys'。
set -s extended-keys on


# allow the title bar to adapt to whatever host you connect to
set -g set-titles on
set -g set-titles-string "#T"

# import
if-shell "uname -s | grep -q Darwin" "source ~/.config/tmux/macos.conf"

source ~/.config/tmux/theme.conf
source ~/.config/tmux/statusline.conf
source ~/.config/tmux/utility.conf

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-pain-control'

# 画面内のURLをキーボードで選んでブラウザで開く (prefix + u)。
# mouse on 下では Shift+クリックでのリンク起動がシビア(正確なホバーが必要・
# 折り返したURLを拾えない)なため、クリックに依存しない確実な導線として用意する。
# 既定でtmuxポップアップにfzf候補を出し、選択したURLをmacOSのopenで開く。
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @fzf-url-bind 'u'
# macOS 専用 repo なので open を明示(プラグインは xdg-open を先に探すため)
set -g @fzf-url-open 'open'
set -g @fzf-url-fzf-options '-p 60%,40% --prompt=" URL " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# --- セッション/レイアウトの永続化 ---
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# resurrect: ペインのスクロールバック内容も保存・復元する
set -g @resurrect-capture-pane-contents 'on'

# continuum: 15分間隔で自動保存し、tmuxサーバ起動時に前回状態を自動復元する
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.config/tmux/plugins/tpm/tpm'
