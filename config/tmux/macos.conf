# osx clipboard
#
# 古いmacOSでtmux内のcopy操作(pbcopy/pbpaste)が効かない問題への対策。
# default-command: tmuxが新しいpane/windowを開く時に実行するコマンド。
# > which reattach-to-user-namespace > /dev/null
# このツールがインストールされているか確認(出力は捨てる)
#
# > && reattach-to-user-namespace -l $SHELL || $SHELL
# あれば、それ経由でログインシェルを起動。なければ普通にシェルを起動
# macOS Sierra以降のtmuxではこの問題は概ね解消されているため、現在は不要と思われる
#
# set-option -g default-command "which reattach-to-user-namespace > /dev/null && reattach-to-user-namespace -l $SHELL || $SHELL"

# Undercurl / truecolor
#
# helix/NeovimなどでLSPの警告などを色付きの波線下線(undercurl)を外側端末(ghostty)へ
# 転送するための設定。tmux 3.x の terminal-features で有効化する。
#   usstyle : スタイル付き・色付き下線(undercurl含む)を外側端末へ転送
#   RGB     : truecolor
# 注: helix 側では別途 editor.undercurl = true が必要(デフォルトでは描画しない)。
set -as terminal-features ",xterm-ghostty:usstyle:RGB"
